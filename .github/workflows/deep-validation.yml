name: Deep validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deep:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Deep validation
        shell: pwsh
        run: .\tools\Test-Repo.ps1 -Tier Deep
